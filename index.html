<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFS Gym — Client Intake Form</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #007bff;
            --text: #ffffff;
            --muted: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 { color: var(--accent); margin-bottom: 5px; }
        header p { color: var(--muted); }

        .section {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid var(--accent);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group { margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        
        .helper { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; display: block; }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #252525;
            color: white;
            box-sizing: border-box;
        }

        .checkbox-group, .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            background: #252525;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .checkbox-item input { margin-right: 10px; }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #0056b3; transform: translateY(-2px); }

        @media (max-width: 600px) {
            .checkbox-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AFS Gym Brand Intake</h1>
        <p>Let's build something legendary together. 💪</p>
    </header>

    <form id="intakeForm">
        <!-- SECTION 1 -->
        <div class="section">
            <span class="section-title">1. Brand & Identity</span>
            
            <div class="form-group">
                <label>Official Gym Name *</label>
                <input type="text" name="gym_name" required placeholder="e.g. AFS Fitness Pradhan Nagar">
            </div>

            <div class="form-group">
                <label>Do you have a logo?</label>
                <select name="logo_status">
                    <option value="Has Logo">Yes, I have proper files</option>
                    <option value="Needs Improvement">Yes, but needs improvement</option>
                    <option value="Only on Banners">Only on old banners</option>
                    <option value="No Logo">No logo at all</option>
                </select>
            </div>

            <div class="form-group">
                <label>Brand Vibe (Select all that apply)</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" name="vibe" value="Hardcore"> 💪 Hardcore</label>
                    <label class="checkbox-item"><input type="checkbox" name="vibe" value="Premium"> 👑 Premium</label>
                    <label class="checkbox-item"><input type="checkbox" name="vibe" value="Community"> 🤝 Friendly</label>
                    <label class="checkbox-item"><input type="checkbox" name="vibe" value="Energetic"> ⚡ Energetic</label>
                </div>
            </div>
        </div>

        <!-- SECTION 2 -->
        <div class="section">
            <span class="section-title">2. Locations & Contact</span>
            <div class="form-group">
                <label>Branch Addresses *</label>
                <textarea name="addresses" rows="3" required placeholder="Branch 1 address... Branch 2 address..."></textarea>
            </div>
            <div class="form-group">
                <label>Contact Number for Ads</label>
                <input type="text" name="contact_num" placeholder="e.g. +91 98765-43210">
            </div>
        </div>

        <!-- SECTION 3 -->
        <div class="section">
            <span class="section-title">3. Services & Pricing</span>
            <div class="form-group">
                <label>What do you offer?</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" name="services" value="Weight Training"> Weight Training</label>
                    <label class="checkbox-item"><input type="checkbox" name="services" value="PT"> Personal Training</label>
                    <label class="checkbox-item"><input type="checkbox" name="services" value="Yoga/Zumba"> Yoga / Zumba</label>
                    <label class="checkbox-item"><input type="checkbox" name="services" value="Steam"> Steam/Sauna</label>
                </div>
            </div>
            <div class="form-group">
                <label>Show prices on website?</label>
                <select name="show_price">
                    <option value="Yes">Yes - Full Pricing</option>
                    <option value="Range">Show Range Only</option>
                    <option value="No">No - Enquiry Based</option>
                </select>
            </div>
        </div>

        <!-- SECTION 4 -->
        <div class="section">
            <span class="section-title">4. Ads & Marketing</span>
            <div class="form-group">
                <label>Monthly Ads Budget</label>
                <select name="budget">
                    <option value="Under 2k">Under ₹2,000</option>
                    <option value="2k-5k">₹2,000 - ₹5,000</option>
                    <option value="5k-10k">₹5,000 - ₹10,000</option>
                    <option value="10k+">Above ₹10,000</option>
                </select>
            </div>
            <div class="form-group">
                <label>Main Ad Goal</label>
                <input type="text" name="ad_goal" placeholder="e.g. Get more leads, brand awareness">
            </div>
        </div>

        <button type="button" onclick="sendToWhatsApp()">SUBMIT VIA WHATSAPP</button>
    </form>
</div>

<script>
    function sendToWhatsApp() {
        const form = document.getElementById('intakeForm');
        const formData = new FormData(form);
        
        let message = "*AFS GYM INTAKE FORM*%0A%0A";
        
        // Loop through text/select fields
        formData.forEach((value, key) => {
            // This part handles checkboxes specifically to group them
            if (key === "vibe" || key === "services") return; 
            message += `*${key.replace('_', ' ').toUpperCase()}:* ${value}%0A`;
        });

        // Grouping Checkboxes
        const vibes = Array.from(document.querySelectorAll('input[name="vibe"]:checked')).map(el => el.value);
        const services = Array.from(document.querySelectorAll('input[name="services"]:checked')).map(el => el.value);

        if(vibes.length > 0) message += `%0A*VIBE:* ${vibes.join(', ')}`;
        if(services.length > 0) message += `%0A*SERVICES:* ${services.join(', ')}`;

        // Replace with your number
        const phone = "919475435509"; 
        const url = `https://wa.me/${phone}?text=${message}`;
        
        window.open(url, '_blank').focus();
    }
</script>

</body>
</html>
